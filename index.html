<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TWS 抽卡小遊戲 ✨</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* 右上角個人頁面入口 */
    .profile-avatar-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      text-decoration: none;
    }
    .avatar-icon {
      width: 45px;
      height: 45px;
      background: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      transition: transform 0.2s;
    }
    .avatar-icon:hover {
      transform: scale(1.1);
    }

    .main-box {
      background: #ffffff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 600px;
      width: 100%;
      margin-top: 40px;
    }

    h1 { color: #333; margin-bottom: 5px; }
    .welcome-user { color: #666; margin-bottom: 25px; font-weight: bold; }

    /* 抽卡舞台 */
    .card-stage {
      width: 200px;
      height: 300px;
      border: 2px dashed #ccc;
      border-radius: 15px;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fafafa;
      font-size: 14px;
      color: #999;
      overflow: hidden;
    }
    .card-stage img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .draw-btn {
      background: linear-gradient(90deg, #a1c4fd 0%, #c2e9fb 100%);
      border: none;
      padding: 12px 40px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(161, 196, 253, 0.4);
      transition: transform 0.2s;
    }
    .draw-btn:hover { transform: scale(1.05); }

    /* 初次進站彈窗：完美並排 6 欄 */
    .overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .modal {
      background: #fff;
      padding: 30px;
      border-radius: 20px;
      max-width: 800px;
      width: 90%;
      text-align: center;
    }
    .modal input {
      font-size: 16px;
      padding: 10px;
      width: 80%;
      max-width: 300px;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    /* 🎯 關鍵修正：一排 6 個成員 */
    .member-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr); 
      gap: 10px;
      margin: 20px 0;
    }
    .member-btn {
      padding: 12px 5px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      transition: all 0.2s;
    }
    .member-btn.selected {
      background: #a1c4fd;
      color: white;
      border-color: #a1c4fd;
    }
    .submit-btn {
      background: #333;
      color: #fff;
      border: none;
      padding: 10px 30px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
    }
  </style>
</head>
<body>

<!-- 右上角個人頁面入口 -->
<a href="profile.html" class="profile-avatar-btn" title="個人頁面">
  <div class="avatar-icon">👤</div>
</a>

<div class="main-box">
  <h1>TWS 抽卡主頁</h1>
  <div class="welcome-user" id="welcome-text">歡迎光臨！</div>
  
  <div class="card-stage" id="card-stage">
    點擊下方按鈕開始抽卡 ✨
  </div>
  
  <button class="draw-btn" onclick="drawCard()">快樂抽卡去 🎲</button>
</div>

<!-- 初次進站歡迎彈窗 -->
<div class="overlay" id="welcome-modal">
  <div class="modal">
    <h2>歡迎來到 TWS 抽卡世界 💙</h2>
    <p>請輸入你的暱稱：</p>
    <input type="text" id="user-nickname" placeholder="例如：幸運的42">
    
    <p>請選擇你的本命成員：</p>
    <!-- 完美並排的 6 位成員選單 -->
    <div class="member-grid">
      <button class="member-btn" onclick="selectMember(this, '申晶㬊')">申晶㬊</button>
      <button class="member-btn" onclick="selectMember(this, '韓振')">韓振</button>
      <button class="member-btn" onclick="selectMember(this, '都勳')">都勳</button>
      <button class="member-btn" onclick="selectMember(this, '宰禧')">宰禧</button>
      <button class="member-btn" onclick="selectMember(this, '志薰')">志薰</button>
      <button class="member-btn" onclick="selectMember(this, '頃旼')">頃旼</button>
    </div>
    
    <button class="submit-btn" onclick="saveUserData()">開啟抽卡旅程</button>
  </div>
</div>

<script>
  // --- Cookie 工具組 ---
  function setCookie(name, value, days = 30) {
    const d = new Date();
    d.setTime(d.getTime() + (days*24*60*60*1000));
    document.cookie = `${name}=${encodeURIComponent(value)};expires=${d.toUTCString()};path=/`;
  }

  function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
    return "";
  }

  let selectedBias = "";

  // 選擇本命成員的點擊高亮效果
  function selectMember(btn, name) {
    const buttons = document.querySelectorAll('.member-btn');
    buttons.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedBias = name;
  }

  // --- 檢查用戶狀態 ---
  function checkUserStatus() {
    const nickname = getCookie("nickname");
    const bias = getCookie("bias");

    if (nickname && bias) {
      // 💡 已有 Cookie 紀錄，直接顯示歡迎字樣，不彈窗
      document.getElementById("welcome-text").innerText = `嗨，${nickname}！你的本命是：${bias} ❤️`;
    } else {
      // 💡 沒有紀錄（初次進站或被垃圾桶刪除），顯示選單彈窗
      document.getElementById("welcome-modal").style.display = "flex";
    }
  }

  // 儲存新用戶資料
  function saveUserData() {
    const nickname = document.getElementById("user-nickname").value.trim();
    if (!nickname) { alert("請輸入暱稱！"); return; }
    if (!selectedBias) { alert("請選擇一位本命成員！"); return; }

    setCookie("nickname", nickname);
    setCookie("bias", selectedBias);

    // 關閉彈窗並重整
    document.getElementById("welcome-modal").style.display = "none";
    window.location.reload();
  }

  // --- 模擬抽卡功能（總共 18 張卡） ---
  function drawCard() {
    // 隨機抽 1 ~ 18 號卡片
    const cardNumber = Math.floor(Math.random() * 18) + 1;
    const cardId = `card_${cardNumber}`;

    // 更新舞台畫面 (💡 請確保你有對應的圖片路徑，例如 images/card_1.jpg)
    const stage = document.getElementById("card-stage");
    stage.innerHTML = `<img src="images/card_${cardNumber}.jpg" alt="卡片" onerror="this.src='https://placehold.co/200x300?text=Card+${cardNumber}'">`;

    // 把抽中的卡片序號存入 localStorage (提供給 profile.html 計算卡冊與進度)
    let obtainedCards = JSON.parse(localStorage.getItem("obtainedCards") || "[]");
    if (!obtainedCards.includes(cardId)) {
      obtainedCards.push(cardId);
      localStorage.setItem("obtainedCards", JSON.stringify(obtainedCards));
    }
  }

  // 頁面載入執行
  window.onload = checkUserStatus;
</script>
</body>
</html>
