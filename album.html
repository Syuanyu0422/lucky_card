<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 TWS 電子卡冊 🗂️</title>
    <style>
        :root {
            --tws-blue: #4A90E2;
            --tws-light-blue: #EBF3FF;
            --tws-pink: #FF6B8B;
            --text-dark: #2C3E50;
            --ssr-gold: #F5A623;
            --sr-blue: #2F80ED;
            --r-gray: #7F8C8D;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        body {
            background-color: var(--tws-light-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .album-container {
            background: white;
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(74, 144, 226, 0.15);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h2 { font-size: 22px; color: var(--text-dark); margin: 0 0 15px 0; }

        .filter-section {
            width: 100%;
            background: #F8FAFC;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 15px;
            font-size: 13px;
        }
        .filter-controls {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }
        .filter-controls select {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #CBD5E1;
        }
        .owned-only-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .card-item {
            background: #F1F5F9;
            border-radius: 12px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            aspect-ratio: 2 / 3;
            border: 2px solid transparent;
        }

        .card-item.owned.R { border-color: var(--r-gray); background: #FAF9F6; }
        .card-item.owned.SR { border-color: var(--sr-blue); background: #F0F6FF; }
        .card-item.owned.SSR { border-color: var(--ssr-gold); background: #FFF9E6; font-weight: bold; }

        .card-item.not-owned { opacity: 0.35; filter: grayscale(100%); }

        .card-rarity { font-size: 11px; font-weight: 800; padding: 2px 6px; border-radius: 6px; margin-bottom: 4px; color: white; }
        .R .card-rarity { background: var(--r-gray); }
        .SR .card-rarity { background: var(--sr-blue); }
        .SSR .card-rarity { background: var(--ssr-gold); }
        .not-owned .card-rarity { background: #94A3B8; }

        .card-name { font-size: 12px; color: var(--text-dark); font-weight: 600; margin-top: 4px; }
        .card-count {
            position: absolute;
            top: 5px; right: 5px;
            background: var(--tws-pink);
            color: white;
            font-size: 10px;
            font-weight: bold;
            padding: 2px 5px;
            border-radius: 8px;
        }
        .lock-icon { font-size: 16px; margin-bottom: 2px; }

        .back-btn {
            background: var(--tws-blue);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            text-decoration: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="album-container">
        <h2>🗂️ 我的 TWS 珍藏卡冊</h2>
        
        <div class="filter-section">
            <div class="filter-controls">
                <select id="filter-member" onchange="renderAlbumCards()">
                    <option value="all">🔍 所有成員</option>
                </select>
                <select id="filter-rarity" onchange="renderAlbumCards()">
                    <option value="all">💎 所有等級</option>
                    <option value="R">R</option>
                    <option value="SR">SR</option>
                    <option value="SSR">SSR</option>
                </select>
            </div>
            <label class="owned-only-label">
                <input type="checkbox" id="filter-owned" onchange="renderAlbumCards()"> 只顯示我已擁有
            </label>
        </div>

        <div class="cards-grid" id="album-grid"></div>

        <!-- 🌟 返回超連結：點了會刷新並跳回 index.html -->
        <a href="index.html" class="back-btn">🎯 返回抽卡畫面</a>
    </div>

    <script>
        const MEMBERS = ["SHINYU", "DOHOON", "YOUNGJAE", "HANJIN", "JIHOON", "KYUNGMIN"];
        const RARITIES = ["R", "SR", "SSR"];
        let cardCollection = {};

        // 頁面載入時自動執行
        window.onload = function() {
            // 1. 讀取在 index.html 抽卡時存下來的數據
            const savedCollection = localStorage.getItem("tws_card_collection");
            if (savedCollection) {
                cardCollection = JSON.parse(savedCollection);
            }

            // 2. 初始化成員下拉選單
            const memberSelect = document.getElementById("filter-member");
            MEMBERS.forEach(m => {
                memberSelect.innerHTML += `<option value="${m}">${m}</option>`;
            });

            // 3. 畫出所有卡片
            renderAlbumCards();
        };

        function renderAlbumCards() {
            const grid = document.getElementById("album-grid");
            grid.innerHTML = "";

            const filterMember = document.getElementById("filter-member").value;
            const filterRarity = document.getElementById("filter-rarity").value;
            const filterOwned = document.getElementById("filter-owned").checked;

            MEMBERS.forEach(memberName => {
                RARITIES.forEach(r => {
                    const cardKey = `${memberName}_${r}`;
                    const count = cardCollection[cardKey] || 0;
                    const isOwned = count > 0;

                    if (filterMember !== "all" && filterMember !== memberName) return;
                    if (filterRarity !== "all" && filterRarity !== r) return;
                    if (filterOwned && !isOwned) return;

                    let cardHtml = "";
                    if (isOwned) {
                        cardHtml = `
                            <div class="card-item owned ${r}">
                                <div class="card-count">x${count}</div>
                                <div class="card-rarity">${r}</div>
                                <div class="card-name">${memberName}</div>
                            </div>
                        `;
                    } else {
                        cardHtml = `
                            <div class="card-item not-owned ${r}">
                                <div class="lock-icon">🔒</div>
                                <div class="card-rarity">${r}</div>
                                <div class="card-name">${memberName}</div>
                            </div>
                        `;
                    }
                    grid.innerHTML += cardHtml;
                });
            });

            if(grid.innerHTML === "") {
                grid.innerHTML = `<div style="grid-column: span 3; color:#94A3B8; padding: 40px 0; font-size:14px;">找不到符合條件的小卡 🌟</div>`;
            }
        }
    </script>
</body>
</html>
